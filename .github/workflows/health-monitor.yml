name: Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'  # cada 5 minutos
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check app health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://www.futbolweb.app)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "HTTP status: $STATUS"

      - name: Activate maintenance if down
        if: steps.health.outputs.status != '200'
        run: |
          echo "❌ App down (HTTP ${{ steps.health.outputs.status }}) — activating maintenance"
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_MAINTENANCE }}"

      - name: Confirm app is up
        if: steps.health.outputs.status == '200'
        run: |
          echo "✅ App healthy (HTTP 200)"

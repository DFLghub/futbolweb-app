name: Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check app health
        id: health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://www.futbolweb.app)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "HTTP status: $STATUS"

      - name: Check maintenance page
        id: maintenance
        run: |
          BODY=$(curl -s --max-time 10 https://www.futbolweb.app)
          if echo "$BODY" | grep -q "mantenimiento"; then
            echo "active=true" >> $GITHUB_OUTPUT
          else
            echo "active=false" >> $GITHUB_OUTPUT
          fi

      - name: App is DOWN — activate maintenance
        if: steps.health.outputs.status != '200'
        run: |
          echo "❌ App down — activating maintenance"
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_MAINTENANCE }}"

      - name: App recovered — restore main
        if: steps.health.outputs.status == '200' && steps.maintenance.outputs.active == 'true'
        run: |
          echo "✅ App recovered — restoring main"
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_MAIN }}"

      - name: App healthy — no action needed
        if: steps.health.outputs.status == '200' && steps.maintenance.outputs.active == 'false'
        run: echo "✅ App healthy — no action needed"
